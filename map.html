<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mappa — Elden Ring</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0c0b;--bg2:#141210;--surface:#1c1915;--surface2:#242018;
  --border:#2e2920;--border2:#3d3628;
  --gold:#c9a94e;--gold-dim:#7a6530;--gold-glow:rgba(201,169,78,.18);
  --text:#d4c9b0;--text2:#8a8070;--text3:#5a5448;
  --green:#2a6040;--green2:#3a8055;--green-bg:#1a2a1e;--green-bdr:#2a5035;
  --sote-bg:rgba(74,48,96,.4);--sote-clr:#9a70c8;--sote-bdr:rgba(122,80,160,.3);
  --base-bg:rgba(40,55,30,.4);--base-clr:#6a8a50;--base-bdr:rgba(80,100,60,.25);
  --nav-h:54px;--r:6px;--panel:260px;
  --ff-d:'Cinzel',serif;--ff-b:'Crimson Pro',Georgia,serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--ff-b);-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
a{color:var(--gold);text-decoration:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* NAV */
.topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:linear-gradient(180deg,#0a0908f0,#0d0c0bcc);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:500}
.topnav-inner{padding:0 20px;height:100%;display:flex;align-items:center}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:var(--ff-d);font-size:14px;font-weight:700;color:var(--gold);letter-spacing:.1em;margin-right:28px;white-space:nowrap;flex-shrink:0}
.nav-links{display:flex;align-items:stretch;height:var(--nav-h);flex:1;overflow-x:auto;scrollbar-width:none}
.nav-links::-webkit-scrollbar{display:none}
.nav-link{display:flex;align-items:center;gap:5px;padding:0 14px;font-family:var(--ff-d);font-size:10px;letter-spacing:.1em;color:var(--text3);border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap;text-decoration:none}
.nav-link:hover{color:var(--text2)}.nav-link.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-wip{font-size:8px;background:rgba(60,100,180,.3);color:#7aaaee;border:1px solid rgba(80,130,200,.3);border-radius:3px;padding:1px 4px}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.nav-stat{font-family:var(--ff-d);font-size:10px;color:var(--text2);background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;white-space:nowrap}
.lang-toggle{display:flex;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.lang-btn{background:none;border:none;padding:5px 9px;font-family:var(--ff-d);font-size:10px;color:var(--text3);cursor:pointer;transition:all .15s}
.lang-btn.active{background:rgba(201,169,78,.12);color:var(--gold)}
/* LAYOUT */
.map-layout{position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;display:flex}
/* SIDE PANEL */
.side-panel{width:var(--panel);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;z-index:10}
.side-header{padding:14px;border-bottom:1px solid var(--border)}
.side-title{font-family:var(--ff-d);font-size:13px;color:var(--gold);letter-spacing:.08em;margin-bottom:10px}
.search-wrap{position:relative}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.search-inp{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:6px 8px 6px 28px;color:var(--text);font-family:var(--ff-b);font-size:13px;outline:none;transition:border-color .2s}
.search-inp::placeholder{color:var(--text3);font-size:12px}
.search-inp:focus{border-color:var(--gold-dim)}
.cat-pills{display:flex;flex-wrap:wrap;gap:4px;padding:8px 14px;border-bottom:1px solid var(--border)}
.cat-pill{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:3px 9px;font-size:10px;font-family:var(--ff-d);letter-spacing:.05em;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-pill:hover{border-color:var(--gold-dim);color:var(--text2)}
.cat-pill.active{background:rgba(201,169,78,.1);border-color:var(--gold-dim);color:var(--gold)}
.toggle-row{display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border)}
.toggle-btn{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:5px 4px;font-size:9px;font-family:var(--ff-d);letter-spacing:.04em;color:var(--text3);cursor:pointer;transition:all .15s;text-align:center}
.toggle-btn:hover{border-color:var(--gold-dim);color:var(--text2)}
.toggle-btn.active{background:rgba(201,169,78,.1);border-color:var(--gold-dim);color:var(--gold)}
.toggle-btn.on-green.active{background:rgba(42,96,64,.2);border-color:var(--green-bdr);color:var(--green2)}
.pin-list{flex:1;overflow-y:auto;padding:4px 0}
.pin-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;transition:background .15s;border-left:2px solid transparent}
.pin-item:hover{background:var(--surface)}
.pin-item.active-pin{background:var(--surface);border-left-color:var(--gold)}
.pin-item.found-pin{background:rgba(26,42,30,.4);border-left-color:var(--green-bdr)}
.pin-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1px solid currentColor;opacity:.9}
.pin-img{width:24px;height:24px;flex-shrink:0;background:var(--surface2);border-radius:3px;border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px}
.pin-img img{width:22px;height:22px;object-fit:contain;display:block}
.pin-info{flex:1;min-width:0}
.pin-name{font-family:var(--ff-d);font-size:10px;color:var(--text);letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pin-item.found-pin .pin-name{color:var(--green2)}
.pin-loc{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pin-check{font-size:10px;color:var(--green2);flex-shrink:0;width:14px;text-align:center}
.pin-count{padding:6px 14px;font-size:10px;font-family:var(--ff-d);color:var(--text3);letter-spacing:.05em;border-top:1px solid var(--border);flex-shrink:0}
/* MAP */
.map-container{flex:1;position:relative}
#map{width:100%;height:100%;background:#0a0908}
.leaflet-container{background:#0a0908;font-family:var(--ff-b)}
.leaflet-control-zoom a{background:var(--surface)!important;color:var(--gold)!important;border-color:var(--border2)!important}
.leaflet-control-attribution{background:rgba(13,12,11,.8)!important;color:var(--text3)!important;font-size:9px}
.leaflet-control-attribution a{color:var(--text2)!important}
/* Markers */
.map-marker{width:28px;height:28px;border-radius:50%;border:2px solid currentColor;background:rgba(13,12,11,.85);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s,box-shadow .15s;backdrop-filter:blur(4px);position:relative}
.map-marker:hover{transform:scale(1.25);box-shadow:0 0 10px currentColor}
.map-marker.found-m{opacity:.5}
.map-marker.found-m::after{content:'✓';position:absolute;bottom:-3px;right:-3px;background:var(--green);border-radius:50%;width:12px;height:12px;display:flex;align-items:center;justify-content:center;color:#b0e8c0;font-size:8px;font-family:var(--ff-d);line-height:12px;text-align:center}
.marker-img{width:20px;height:20px;object-fit:contain;pointer-events:none;display:block}
.marker-emoji{font-size:13px;line-height:1;pointer-events:none}
/* Popup */
.leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--border2)!important;border-radius:8px!important;box-shadow:0 8px 32px rgba(0,0,0,.6)!important;padding:0!important}
.leaflet-popup-content{margin:0!important;width:220px!important}
.leaflet-popup-tip{background:var(--surface)!important}
.popup-body{padding:12px}
.popup-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.popup-thumb{width:40px;height:40px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.popup-thumb img{width:36px;height:36px;object-fit:contain;display:block}
.popup-name{font-family:var(--ff-d);font-size:12px;color:var(--gold);letter-spacing:.04em;line-height:1.3}
.popup-loc{font-size:11px;color:var(--text3);margin-bottom:8px;line-height:1.4}
.popup-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.badge{display:inline-block;font-size:9px;font-family:var(--ff-d);letter-spacing:.06em;padding:2px 6px;border-radius:3px;white-space:nowrap}
.badge-sote{background:var(--sote-bg);color:var(--sote-clr);border:1px solid var(--sote-bdr)}
.badge-base{background:var(--base-bg);color:var(--base-clr);border:1px solid var(--base-bdr)}
.popup-btn{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:7px;font-family:var(--ff-d);font-size:10px;letter-spacing:.08em;color:var(--text2);cursor:pointer;transition:all .15s;text-align:center}
.popup-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.popup-btn.found-btn{background:rgba(42,96,64,.25);border-color:var(--green-bdr);color:var(--green2)}
/* Legend */
.map-legend{position:absolute;bottom:20px;right:12px;z-index:400;background:rgba(20,18,16,.92);backdrop-filter:blur(8px);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;min-width:140px}
.legend-title{font-family:var(--ff-d);font-size:10px;color:var(--gold);letter-spacing:.08em;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0}
.c-tal{color:#c9a94e}.c-wep{color:#e07070}.c-arm{color:#7099c8}
.c-sor{color:#9070e8}.c-inc{color:#e8c048}.c-spi{color:#70c8b0}.c-shi{color:#80a870}
@media(max-width:900px){.nav-logo span:last-child,.nav-link span:not(:first-child),.nav-stat{display:none}.nav-link{padding:0 10px}}
@media(max-width:700px){:root{--panel:0px}.side-panel{display:none}}
</style>
</head>

    ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(2048,i);ctx.stroke();
  }
  // Zone blobs
  var zones=[
    {x:975,y:1350,rx:220,ry:180,c:'rgba(50,75,30,0.45)',  label:'Limgrave'},
    {x:975,y:1600,rx:180,ry:160,c:'rgba(40,65,25,0.4)',   label:'Weeping Peninsula'},
    {x:760,y:960, rx:240,ry:290,c:'rgba(30,50,80,0.45)',  label:'Liurnia of the Lakes'},
    {x:550,y:740, rx:160,ry:170,c:'rgba(55,35,80,0.4)',   label:'Caria Manor'},
    {x:1350,y:1250,rx:260,ry:210,c:'rgba(90,20,20,0.45)', label:'Caelid'},
    {x:1010,y:790, rx:230,ry:175,c:'rgba(80,60,20,0.45)', label:'Altus Plateau'},
    {x:700,y:650,  rx:185,ry:165,c:'rgba(90,35,10,0.4)',  label:'Mt. Gelmir'},
    {x:1050,y:870, rx:155,ry:130,c:'rgba(140,120,30,0.35)',label:'Leyndell'},
    {x:1400,y:490, rx:230,ry:160,c:'rgba(70,90,110,0.4)', label:'Mountaintops'},
    {x:660,y:490,  rx:195,ry:150,c:'rgba(90,100,120,0.4)',label:'Consecrated Snowfield'},
    {x:520,y:310,  rx:155,ry:130,c:'rgba(110,55,75,0.4)', label:"Haligtree"},
    {x:1600,y:380, rx:185,ry:160,c:'rgba(80,40,15,0.45)', label:'Farum Azula'},
    {x:400,y:1100, rx:130,ry:160,c:'rgba(60,0,40,0.4)',   label:'Mohgwyn'},
    {x:1700,y:1600,rx:280,ry:250,c:'rgba(70,40,100,0.45)',label:'Shadow of the Erdtree'},
  ];
  zones.forEach(function(z){
    var g=ctx.createRadialGradient(z.x,z.y,0,z.x,z.y,Math.max(z.rx,z.ry));
    g.addColorStop(0,z.c);g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(z.x,z.y,z.rx,z.ry,0,0,Math.PI*2);ctx.fill();
  });
  // Erdtree glow
  var et=ctx.createRadialGradient(970,870,0,970,870,200);
  et.addColorStop(0,'rgba(201,169,78,0.3)');et.addColorStop(0.6,'rgba(201,169,78,0.08)');et.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=et;ctx.beginPath();ctx.ellipse(970,870,160,260,0,0,Math.PI*2);ctx.fill();
  // Zone labels
  ctx.textAlign='center';ctx.textBaseline='middle';
  zones.forEach(function(z){
    ctx.font='bold 16px serif';
    ctx.fillStyle='rgba(201,169,78,0.6)';
    ctx.fillText(z.label,z.x,z.y);
  });
  // Vignette
  var vig=ctx.createRadialGradient(1024,1024,700,1024,1024,1200);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.7)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,2048,2048);
  L.imageOverlay(canvas.toDataURL('image/png'),[[0,0],[2048,2048]],
    {attribution:'Elden Ring &copy; FromSoftware &middot; Fan project'}).addTo(erMap);
  erMap.fitBounds([[0,0],[2048,2048]]);
  erMap.setView([1024,1024],-1);
})();

var markerMap = {};
var markerLayer = L.layerGroup().addTo(erMap);

// ── Marker creation ───────────────────────────────────────────────────────────
function buildMarkerHtml(pin, found) {
  var meta = CAT_META[pin.cat] || { icon: '?', color: '#888' };
  var url  = getCatEmoji(pin.cat);   // ← uses getImgUrl, no shadowing possible
  var inner = url
    ? '<img class="marker-img" src="' + url + '" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'block\'">'
      + '<span class="marker-emoji" style="display:none">' + meta.icon + '</span>'
    : '<span class="marker-emoji">' + meta.icon + '</span>';
  return '<div class="map-marker' + (found ? ' found-m' : '') + '"'
       + ' style="color:' + meta.color + ';border-color:' + meta.color + '">'
       + inner + '</div>';
}

function makeMarker(pin) {
  var found   = isFound(pin.cat, pin.name);
  var icon    = L.divIcon({ html: buildMarkerHtml(pin, found), className: '', iconSize: [28,28], iconAnchor: [14,14] });
  var latLng  = [mapH - (pin.y * SCALE), pin.x * SCALE];
  var marker  = L.marker(latLng, { icon: icon }).addTo(markerLayer);
  marker.bindPopup(buildPopup(pin), { maxWidth: 240 });
  marker.on('click', function() { highlightPin(pin.id); });
  markerMap[pin.id] = marker;
}

// ── Popup builder ─────────────────────────────────────────────────────────────
function buildPopup(pin) {
  var meta  = CAT_META[pin.cat] || { icon: '?', color: '#888' };
  var found = isFound(pin.cat, pin.name);
  var url   = getCatEmoji(pin.cat);   // ← uses getImgUrl
  var thumb = url
    ? '<img src="' + url + '" style="width:36px;height:36px;object-fit:contain" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'block\'">'
      + '<span style="font-size:22px;display:none">' + meta.icon + '</span>'
    : '<span style="font-size:22px">' + meta.icon + '</span>';
  var dlcBadge = pin.dlc === 'SotE'
    ? '<span class="badge badge-sote">SotE</span>'
    : '<span class="badge badge-base">Base</span>';
  var btnCls  = found ? 'popup-btn found-btn' : 'popup-btn';
  var btnTxt  = found ? t('unfound_btn') : t('found_btn');
  return '<div class="popup-body">'
    + '<div class="popup-head">'
    +   '<div class="popup-thumb">' + thumb + '</div>'
    +   '<div class="popup-name">' + pin.name + '</div>'
    + '</div>'
    + '<div class="popup-loc">&#128205; ' + pin.loc + '</div>'
    + '<div class="popup-badges">' + dlcBadge + '</div>'
    + '<button class="' + btnCls + '" onclick="handlePopupToggle(\'' + pin.id + '\',\'' + pin.cat + '\',\'' + pin.name.replace(/'/g,"\\'") + '\')">'
    + btnTxt + '</button>'
    + '</div>';
}

function handlePopupToggle(id, cat, name) {
  var found = toggleFound(cat, name);
  refreshMarker(id, cat, name, found);
  document.getElementById('navStat').textContent = totalFound() + ' ' + t('nav_found');
  renderPinList();
}

function refreshMarker(id, cat, name, found) {
  var pin = PINS.find(function(p) { return p.id === id; });
  if (!pin) return;
  var marker = markerMap[id];
  if (!marker) return;
  marker.setIcon(L.divIcon({ html: buildMarkerHtml(pin, found), className: '', iconSize: [28,28], iconAnchor: [14,14] }));
  marker.setPopupContent(buildPopup(pin));
  var li = document.getElementById('li-' + id);
  if (li) {
    li.classList.toggle('found-pin', found);
    li.querySelector('.pin-check').textContent = found ? '\u2713' : '';
  }
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function getVisible() {
  var pins = PINS.slice();
  pins = pins.filter(function(p) { return FT.cats.has(p.cat); });
  if (FT.dlc === 'base') pins = pins.filter(function(p) { return p.dlc === 'Base'; });
  if (FT.dlc === 'sote') pins = pins.filter(function(p) { return p.dlc === 'SotE'; });
  if (FT.found) pins = pins.filter(function(p) { return isFound(p.cat, p.name); });
  var q = FT.search.toLowerCase();
  if (q) pins = pins.filter(function(p) { return p.name.toLowerCase().indexOf(q) >= 0 || p.loc.toLowerCase().indexOf(q) >= 0; });
  return pins;
}

function renderPinList() {
  var visible = getVisible();
  var visSet  = new Set(visible.map(function(p) { return p.id; }));
  PINS.forEach(function(p) {
    var m = markerMap[p.id];
    if (!m) return;
    if (visSet.has(p.id)) markerLayer.addLayer(m);
    else markerLayer.removeLayer(m);
  });
  var list = document.getElementById('pinList');
  list.innerHTML = visible.map(function(pin) {
    var meta  = CAT_META[pin.cat] || { icon: '?', color: '#888' };
    var found = isFound(pin.cat, pin.name);
    var url   = getCatEmoji(pin.cat);
    var imgHtml = url
      ? '<img src="' + url + '" style="width:22px;height:22px;object-fit:contain" onerror="this.style.display=\'none\'">'
      : meta.icon;
    var zoneName = pin.loc.split('\u2013')[0].trim();
    return '<div class="pin-item' + (found ? ' found-pin' : '') + '" id="li-' + pin.id + '" onclick="flyTo(\'' + pin.id + '\')">'
      + '<div class="pin-dot" style="color:' + meta.color + ';border-color:' + meta.color + '"></div>'
      + '<div class="pin-img">' + imgHtml + '</div>'
      + '<div class="pin-info">'
      +   '<div class="pin-name">' + pin.name + '</div>'
      +   '<div class="pin-loc">' + zoneName + '</div>'
      + '</div>'
      + '<div class="pin-check">' + (found ? '\u2713' : '') + '</div>'
      + '</div>';
  }).join('');
  document.getElementById('pinCount').textContent = visible.length + ' ' + t('all_pins');
}

function flyTo(id) {
  var pin = PINS.find(function(p) { return p.id === id; });
  if (!pin) return;
  var latLng = [mapH - (pin.y * SCALE), pin.x * SCALE];
  erMap.flyTo(latLng, 1, { duration: 0.8 });
  setTimeout(function() { var m = markerMap[id]; if (m) m.openPopup(); }, 900);
  highlightPin(id);
}

function highlightPin(id) {
  document.querySelectorAll('.pin-item').forEach(function(li) { li.classList.remove('active-pin'); });
  var li = document.getElementById('li-' + id);
  if (li) { li.classList.add('active-pin'); li.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
}

// ── Category pills ────────────────────────────────────────────────────────────
function renderCatPills() {
  document.getElementById('catPills').innerHTML = Object.entries(CAT_META).map(function(entry) {
    var id = entry[0], m = entry[1];
    return '<button class="cat-pill' + (FT.cats.has(id) ? ' active' : '') + '" onclick="toggleCat(\'' + id + '\')">'
      + m.icon + ' ' + t(m.key) + '</button>';
  }).join('');
}

function toggleCat(id) {
  if (FT.cats.has(id) && FT.cats.size > 1) FT.cats.delete(id);
  else FT.cats.add(id);
  renderCatPills(); renderPinList();
}

// ── DLC / Found filters ───────────────────────────────────────────────────────
function setDlc(v) {
  FT.dlc = v;
  ['all','base','sote'].forEach(function(id) {
    document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1)).classList.toggle('active', id === v);
  });
  renderPinList();
}
function toggleFoundF() {
  FT.found = !FT.found;
  document.getElementById('btnFound').classList.toggle('active', FT.found);
  renderPinList();
}

// ── Search ────────────────────────────────────────────────────────────────────
var _st;
document.getElementById('mapSearch').addEventListener('input', function(e) {
  clearTimeout(_st);
  _st = setTimeout(function() { FT.search = e.target.value; renderPinList(); }, 160);
});

// ── Apply i18n labels ─────────────────────────────────────────────────────────
function applyLabels() {
  var lang = getLang();
  document.getElementById('btnIT').classList.toggle('active', lang === 'it');
  document.getElementById('btnEN').classList.toggle('active', lang === 'en');
  document.getElementById('navStat').textContent     = totalFound() + ' ' + t('nav_found');
  document.getElementById('mapSearch').placeholder   = t('search_ph');
  document.getElementById('sideTitle').textContent   = t('map_title');
  document.getElementById('legendTitle').textContent = t('legend');
  document.getElementById('lb-tracker').textContent  = t('nav_tracker');
  document.getElementById('lb-map').textContent      = t('nav_map');
  document.getElementById('lb-build').textContent    = t('nav_build');
  document.getElementById('lb-bestiary').textContent = t('nav_bestiary');
  document.getElementById('lb-wip').textContent      = t('nav_wip');
  document.getElementById('lg-tal').textContent = t('cat_talismans');
  document.getElementById('lg-wep').textContent = t('cat_weapons');
  document.getElementById('lg-arm').textContent = t('cat_armor');
  document.getElementById('lg-sor').textContent = t('cat_sorceries');
  document.getElementById('lg-inc').textContent = t('cat_incantations');
  document.getElementById('lg-spi').textContent = t('cat_spiritashes');
  document.getElementById('lg-shi').textContent = t('cat_shields');
  document.getElementById('btnAll').textContent  = t('all_f');
}

// ── Init ──────────────────────────────────────────────────────────────────────
applyLabels();
PINS.forEach(makeMarker);
renderCatPills();
renderPinList();
</script>
</body>
