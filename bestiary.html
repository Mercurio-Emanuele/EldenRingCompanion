<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bestiario — Elden Ring</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0c0b;--bg2:#141210;--surface:#1c1915;--surface2:#242018;--border:#2e2920;--border2:#3d3628;--gold:#c9a94e;--gold2:#e8c96a;--gold-dim:#7a6530;--gold-glow:rgba(201,169,78,.18);--text:#d4c9b0;--text2:#8a8070;--text3:#5a5448;--green:#2a6040;--green2:#3a8055;--sote-bg:rgba(74,48,96,.4);--sote-clr:#9a70c8;--sote-bdr:rgba(122,80,160,.3);--nav-h:54px;--r:6px;--ff-d:'Cinzel',serif;--ff-b:'Crimson Pro',Georgia,serif;}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--ff-b);font-size:16px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
a{color:var(--gold);text-decoration:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:linear-gradient(180deg,#0a0908f0,#0d0c0bcc);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:200}
.topnav-inner{max-width:1440px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:var(--ff-d);font-size:14px;font-weight:700;color:var(--gold);letter-spacing:.1em;margin-right:28px;white-space:nowrap;flex-shrink:0}
.nav-links{display:flex;align-items:stretch;height:var(--nav-h);flex:1;overflow-x:auto;scrollbar-width:none}
.nav-links::-webkit-scrollbar{display:none}
.nav-link{display:flex;align-items:center;gap:5px;padding:0 14px;font-family:var(--ff-d);font-size:10px;letter-spacing:.1em;color:var(--text3);border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap}
.nav-link:hover{color:var(--text2)}.nav-link.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-wip{font-size:8px;background:rgba(60,100,180,.3);color:#7aaaee;border:1px solid rgba(80,130,200,.3);border-radius:3px;padding:1px 4px}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.nav-stat{font-family:var(--ff-d);font-size:10px;color:var(--text2);background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;white-space:nowrap}
.lang-toggle{display:flex;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.lang-btn{background:none;border:none;padding:5px 9px;font-family:var(--ff-d);font-size:10px;color:var(--text3);cursor:pointer;transition:all .15s}
.lang-btn.active{background:rgba(201,169,78,.12);color:var(--gold)}
.badge{display:inline-block;font-size:9px;font-family:var(--ff-d);letter-spacing:.07em;padding:2px 6px;border-radius:3px;white-space:nowrap}
.badge-sote{background:var(--sote-bg);color:var(--sote-clr);border:1px solid var(--sote-bdr)}
.badge-major{background:rgba(180,60,60,.2);color:#e07070;border:1px solid rgba(180,60,60,.3)}
.badge-field{background:rgba(60,100,60,.2);color:#70b870;border:1px solid rgba(60,100,60,.3)}
.badge-optional{background:rgba(80,80,160,.2);color:#9090e0;border:1px solid rgba(80,80,160,.3)}
.page{padding-top:var(--nav-h)}
.page-header{padding:28px 24px 20px;background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--border)}
.page-header h1{font-family:var(--ff-d);font-size:clamp(18px,3vw,26px);color:var(--gold);letter-spacing:.06em}
.page-header p{font-size:13px;color:var(--text3);font-family:var(--ff-d);letter-spacing:.1em;margin-top:4px}
/* FILTERS */
.filters{position:sticky;top:var(--nav-h);z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 24px}
.filter-row{max-width:1440px;margin:0 auto;display:flex;align-items:center;flex-wrap:wrap;gap:7px}
.chip{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:11px;font-family:var(--ff-d);letter-spacing:.05em;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--gold-dim);color:var(--text)}
.chip.active{background:rgba(201,169,78,.1);border-color:var(--gold-dim);color:var(--gold)}
.search-wrap{position:relative;flex:1;min-width:160px;max-width:300px}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.search-inp{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:6px 10px 6px 30px;color:var(--text);font-family:var(--ff-b);font-size:14px;outline:none;transition:border-color .2s}
.search-inp::placeholder{color:var(--text3)}
.search-inp:focus{border-color:var(--gold-dim)}
.res-label{margin-left:auto;font-size:11px;color:var(--text3);font-family:var(--ff-d);white-space:nowrap}
/* GRID */
.grid-wrap{max-width:1440px;margin:0 auto;padding:16px 24px 60px}
.boss-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
/* BOSS CARD */
.boss-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;animation:fadeIn .22s ease both;position:relative}
.boss-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.boss-card.defeated{background:#1a2a1e;border-color:#2a5035}
.boss-card.defeated .boss-name{color:var(--green2)}
.boss-banner{height:72px;background:radial-gradient(ellipse at 60% 40%,var(--banner-color,#2a2015) 0%,var(--bg) 70%);display:flex;align-items:center;justify-content:flex-end;padding:0 16px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.boss-banner::before{content:attr(data-icon);position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:52px;opacity:.12;pointer-events:none}
.boss-banner-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.boss-body{padding:12px 14px}
.boss-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.boss-icon-wrap{width:44px;height:44px;background:var(--surface2);border:1px solid var(--border2);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.boss-info{flex:1;min-width:0}
.boss-name{font-family:var(--ff-d);font-size:12px;font-weight:600;color:var(--text);letter-spacing:.04em;line-height:1.3;margin-bottom:3px}
.boss-zone{font-size:12px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.boss-defeated-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;background:var(--surface2);transition:all .2s;color:transparent;flex-shrink:0}
.boss-card.defeated .boss-defeated-check{background:var(--green);border-color:var(--green2);color:#b0e8c0}
/* stats row */
.boss-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.bstat{font-size:11px;font-family:var(--ff-d);color:var(--text2)}
.bstat span{color:var(--text)}
/* weakness dots */
.weakness-row{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.weak-label{font-size:10px;color:var(--text3);font-family:var(--ff-d);margin-right:2px}
.wdot{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:default}
/* drops */
.drops-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.drop-tag{font-size:9px;font-family:var(--ff-d);letter-spacing:.04em;background:var(--surface2);border:1px solid var(--border2);border-radius:3px;padding:2px 6px;color:var(--text3);white-space:nowrap}
.drop-tag.remembrance{background:rgba(201,169,78,.08);border-color:rgba(201,169,78,.25);color:var(--gold)}
/* expand panel */
.boss-expand{max-height:0;overflow:hidden;transition:max-height .3s ease;background:var(--surface2);border-top:1px solid var(--border)}
.boss-card.expanded .boss-expand{max-height:200px}
.boss-expand-inner{padding:12px 14px}
.strategy-title{font-family:var(--ff-d);font-size:10px;color:var(--gold);letter-spacing:.08em;margin-bottom:6px}
.strategy-text{font-size:13px;color:var(--text2);line-height:1.5}
/* shimmer */
@keyframes shimmer{0%{left:-100%}100%{left:200%}}
.boss-card.shimmer::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(58,128,85,.12),transparent);animation:shimmer .6s ease;pointer-events:none}
footer{text-align:center;padding:18px;border-top:1px solid var(--border)}
footer p{font-size:10px;color:var(--text3);font-family:var(--ff-d);letter-spacing:.06em}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){.nav-logo span:last-child{display:none}.nav-link span:not(:first-child){display:none}.nav-link{padding:0 10px}.nav-stat{display:none}}
@media(max-width:600px){.filters,.grid-wrap{padding-left:14px;padding-right:14px}.boss-grid{grid-template-columns:1fr}}
</style>
</head>

function toggleDefeated(id){const d=getDefeated();d[id]=!d[id];if(!d[id])delete d[id];saveDefeated(d);return d[id]||false;}

  {id:'radahn',   name:"Starscourge Radahn",       zone:"Redmane Castle – Caelid",  type:'major',  dlc:false, icon:'⭐', color:'#3a1a1a', hp:9044,  runes:70000, weakness:['magic','frost'],     resist:['lightning'], drops:["Remembrance of the Starscourge","Radahn's Great Rune"],  strategy:"Usate i PNG convocabili per distrarlo. Cavalcate Torrent per le cariche. Fase 2 (meteora): avvicinatevi subito per evitare i missili."},

const ST={filter:'all',search:''};

function getFiltered(){
  let b=BOSSES.slice();
  const q=ST.search.toLowerCase();
  if(q) b=b.filter(x=>x.name.toLowerCase().includes(q)||x.zone.toLowerCase().includes(q));
  if(ST.filter==='major')    b=b.filter(x=>x.type==='major');
  if(ST.filter==='field')    b=b.filter(x=>x.type==='field');
  if(ST.filter==='optional') b=b.filter(x=>x.type==='optional');
  if(ST.filter==='sote')     b=b.filter(x=>x.dlc);
  if(ST.filter==='defeated') b=b.filter(x=>isDefeated(x.id));
  return b;
}

function renderGrid(){
  const bosses=getFiltered();
  document.getElementById('resLabel').textContent=bosses.length+' '+t('results');
  if(!bosses.length){document.getElementById('bossGrid').innerHTML='<div style="text-align:center;padding:60px;color:var(--text3);font-family:var(--ff-d);letter-spacing:.1em;grid-column:1/-1">—</div>';return;}
  document.getElementById('bossGrid').innerHTML=bosses.map((boss,i)=>{
    const def=isDefeated(boss.id);
    const typeBadge=boss.type==='major'?'badge-major':boss.type==='field'?'badge-field':'badge-optional';
    var typeLabel=boss.type==='major'?t('boss_major'):boss.type==='field'?t('boss_field'):t('boss_optional');
    const weakHtml=boss.weakness.map(w=>`<div class="wdot" style="background:${WEAK_COLORS[w]||'rgba(100,100,100,.2)'}" title="${w}">${WEAK[w]||w}</div>`).join('');
    const dropHtml=boss.drops.map(d=>`<span class="drop-tag${d.startsWith('Remembrance')?'remembrance':''}">${d}</span>`).join('');
    return`<div class="boss-card${def?' defeated':''}" data-id="${boss.id}" style="--banner-color:${boss.color}" style="animation-delay:${Math.min(i*.015,.25)}s">
      <div class="boss-banner" data-icon="${boss.icon}">
        <div class="boss-banner-badges">
          <span class="badge ${typeBadge}">${typeLabel}</span>
          ${boss.dlc?'<span class="badge badge-sote">SotE</span>':''}
        </div>
      </div>
      <div class="boss-body">
        <div class="boss-top">
          <div class="boss-icon-wrap">${boss.icon}</div>
          <div class="boss-info">
            <div class="boss-name">${boss.name}</div>
            <div class="boss-zone">📍 ${boss.zone}</div>
          </div>
          <div class="boss-defeated-check">${def?'✓':''}</div>
        </div>
        <div class="boss-stats">
          <span class="bstat">HP <span>${boss.hp.toLocaleString()}</span></span>
          <span class="bstat">Rune <span>${boss.runes.toLocaleString()}</span></span>
        </div>
        <div class="weakness-row">
          <span class="weak-label">Debole:</span>${weakHtml}
        </div>
        <div class="drops-row">${dropHtml}</div>
      </div>
      <div class="boss-expand">
        <div class="boss-expand-inner">
          <div class="strategy-title">💡 ${t('strategy')}</div>
          <div class="strategy-text">${boss.strategy}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.boss-card').forEach(card=>{
    card.addEventListener('click',e=>{
      const id=card.dataset.id;
      // Toggle defeat on check area
      const check=card.querySelector('.boss-defeated-check');
      const rect=check.getBoundingClientRect();
      const inCheck=e.clientX>=rect.left-10&&e.clientX<=rect.right+10&&e.clientY>=rect.top-10&&e.clientY<=rect.bottom+10;
      if(inCheck){
        const def=toggleDefeated(id);
        card.classList.toggle('defeated',def);
        if(def){card.classList.add('shimmer');setTimeout(()=>card.classList.remove('shimmer'),700);}
        check.textContent=def?'✓':'';
        if(ST.filter==='defeated')renderGrid();
        return;
      }
      // Expand strategy
      card.classList.toggle('expanded');
    });
  });
}

// chips
document.querySelectorAll('[data-f]').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('[data-f]').forEach(x=>x.classList.remove('active'));
    c.classList.add('active'); ST.filter=c.dataset.f; renderGrid();
  });
});
let st; document.getElementById('searchInp').addEventListener('input',e=>{
  clearTimeout(st);st=setTimeout(()=>{ST.search=e.target.value;renderGrid();},160);
});

renderGrid();
</script>
