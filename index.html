<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Elden Ring Item Tracker – traccia tutti gli item del gioco e del DLC Shadow of the Erdtree">
<title>Item Tracker — Elden Ring</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0c0b;--bg2:#141210;--surface:#1c1915;--surface2:#242018;
  --border:#2e2920;--border2:#3d3628;
  --gold:#c9a94e;--gold2:#e8c96a;--gold-dim:#7a6530;--gold-glow:rgba(201,169,78,.18);
  --text:#d4c9b0;--text2:#8a8070;--text3:#5a5448;
  --green:#2a6040;--green2:#3a8055;--green-bg:#1a2a1e;--green-bdr:#2a5035;
  --sote-bg:rgba(74,48,96,.4);--sote-clr:#9a70c8;--sote-bdr:rgba(122,80,160,.3);
  --base-bg:rgba(40,55,30,.4);--base-clr:#6a8a50;--base-bdr:rgba(80,100,60,.25);
  --nav-h:54px;--r:6px;
  --ff-d:'Cinzel',serif;--ff-b:'Crimson Pro',Georgia,serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--ff-b);font-size:16px;line-height:1.5;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
a{color:var(--gold);text-decoration:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
/* NAV */
.topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:linear-gradient(180deg,#0a0908f0,#0d0c0bcc);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:200}
.topnav-inner{max-width:1440px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:var(--ff-d);font-size:14px;font-weight:700;color:var(--gold);letter-spacing:.1em;text-shadow:0 0 16px var(--gold-glow);margin-right:28px;white-space:nowrap;flex-shrink:0}
.nav-links{display:flex;align-items:stretch;height:var(--nav-h);flex:1;overflow-x:auto;scrollbar-width:none}
.nav-links::-webkit-scrollbar{display:none}
.nav-link{display:flex;align-items:center;gap:5px;padding:0 14px;font-family:var(--ff-d);font-size:10px;letter-spacing:.1em;color:var(--text3);border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap;text-decoration:none}
.nav-link:hover{color:var(--text2)}
.nav-link.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-wip{font-size:8px;background:rgba(60,100,180,.3);color:#7aaaee;border:1px solid rgba(80,130,200,.3);border-radius:3px;padding:1px 4px}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.nav-stat{font-family:var(--ff-d);font-size:10px;letter-spacing:.06em;color:var(--text2);background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;white-space:nowrap}
.lang-toggle{display:flex;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.lang-btn{background:none;border:none;padding:5px 9px;font-family:var(--ff-d);font-size:10px;letter-spacing:.06em;color:var(--text3);cursor:pointer;transition:all .15s}
.lang-btn.active{background:rgba(201,169,78,.12);color:var(--gold)}
/* BADGES */
.badge{display:inline-block;font-size:9px;font-family:var(--ff-d);letter-spacing:.07em;padding:2px 6px;border-radius:3px;white-space:nowrap}
.badge-sote{background:var(--sote-bg);color:var(--sote-clr);border:1px solid var(--sote-bdr)}
.badge-base{background:var(--base-bg);color:var(--base-clr);border:1px solid var(--base-bdr)}
.badge-leg{background:rgba(201,169,78,.12);color:var(--gold);border:1px solid rgba(201,169,78,.3)}
/* PROGRESS */
.prog-track{background:var(--border2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:2px;transition:width .4s ease}
/* TRACKER PAGE */
.page-body{padding-top:var(--nav-h)}
.filters{position:sticky;top:var(--nav-h);z-index:100;background:var(--bg2);border-bottom:1px solid var(--border)}
.filters-inner{max-width:1440px;margin:0 auto;padding:0 20px}
.cat-tabs{display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{background:none;border:none;padding:10px 14px;font-family:var(--ff-d);font-size:10px;letter-spacing:.1em;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.cat-tab:hover{color:var(--text2)}
.cat-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-cnt{display:inline-flex;align-items:center;justify-content:center;background:var(--surface2);color:var(--text3);font-size:9px;padding:1px 5px;border-radius:10px;font-family:var(--ff-b);font-weight:600;transition:background .2s,color .2s}
.cat-tab.active .tab-cnt{background:rgba(201,169,78,.15);color:var(--gold)}
.filter-row{display:flex;align-items:center;flex-wrap:wrap;gap:7px;padding:9px 0}
.chip{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:11px;font-family:var(--ff-d);letter-spacing:.05em;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--gold-dim);color:var(--text)}
.chip.active{background:rgba(201,169,78,.1);border-color:var(--gold-dim);color:var(--gold)}
.fsep{width:1px;height:18px;background:var(--border2);flex-shrink:0}
.search-wrap{position:relative;flex:1;min-width:160px;max-width:300px}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.search-inp{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:6px 10px 6px 30px;color:var(--text);font-family:var(--ff-b);font-size:14px;outline:none;transition:border-color .2s}
.search-inp::placeholder{color:var(--text3)}
.search-inp:focus{border-color:var(--gold-dim)}
.res-label{margin-left:auto;font-size:11px;color:var(--text3);font-family:var(--ff-d);white-space:nowrap}
.stats-bar{max-width:1440px;margin:0 auto;padding:8px 20px;display:flex;align-items:center;gap:12px}
.stat-found{font-family:var(--ff-d);font-size:12px;color:var(--green2)}
.stat-sep,.stat-total{font-family:var(--ff-d);font-size:12px;color:var(--text3)}
.stat-track{flex:1;min-width:60px;height:2px}
.stat-pct{font-family:var(--ff-d);font-size:11px;color:var(--gold);min-width:32px;text-align:right}
.grid-wrap{max-width:1440px;margin:0 auto;padding:12px 20px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(274px,1fr));gap:8px}
/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 12px;cursor:pointer;position:relative;overflow:hidden;animation:fadeIn .22s ease both;transition:border-color .2s,transform .15s}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card.found{background:var(--green-bg);border-color:var(--green-bdr)}
.card.found::before{background:linear-gradient(90deg,transparent,rgba(58,128,85,.4),transparent)}
.card.shimmer::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(201,169,78,.15),transparent);animation:shimmer .6s ease;pointer-events:none}
.card-top{display:flex;align-items:flex-start;gap:9px}
.card-img{width:36px;height:36px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.card.found .card-img{background:rgba(42,96,64,.3);border-color:var(--green-bdr)}
.card-img img{width:32px;height:32px;object-fit:contain;display:block}
.card-img img.err+.img-fb{opacity:1}
.img-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:17px;opacity:0;pointer-events:none;transition:opacity .15s}
.card-body{flex:1;min-width:0}
.card-name{font-family:var(--ff-d);font-size:11.5px;font-weight:600;color:var(--text);letter-spacing:.03em;line-height:1.3;margin-bottom:3px}
.card.found .card-name{color:var(--green2)}
.card-effect{font-size:13px;color:var(--text2);line-height:1.35;font-style:italic}
.card-check{margin-left:auto;flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;background:var(--surface2);transition:all .2s;color:transparent}
.card.found .card-check{background:var(--green);border-color:var(--green2);color:#b0e8c0}
.card-bottom{margin-top:8px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.card-loc{font-size:11px;color:var(--text3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{text-align:center;padding:60px;grid-column:1/-1}
.empty p{font-size:13px;font-family:var(--ff-d);letter-spacing:.1em;color:var(--text3)}
footer{text-align:center;padding:18px;border-top:1px solid var(--border)}
footer p{font-size:10px;color:var(--text3);font-family:var(--ff-d);letter-spacing:.06em}
@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}
@media(max-width:900px){.nav-logo span:last-child{display:none}.nav-link span:not(:first-child){display:none}.nav-link{padding:0 10px}.nav-stat{display:none}}
@media(max-width:600px){.filters-inner{padding:0 12px}.grid-wrap{padding:10px 12px 48px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- NAV (injected by JS) -->
<div id="nav-mount"></div>

<div class="page-body">
  <div class="filters">
    <div class="filters-inner">
      <div class="cat-tabs" id="catTabs"></div>
      <div class="filter-row">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input id="searchInp" class="search-inp" placeholder="">
        </div>
        <button class="chip active" data-f="all" id="cp-all"></button>
        <button class="chip" data-f="found" id="cp-found"></button>
        <button class="chip" data-f="notfound" id="cp-nf"></button>
        <div class="fsep"></div>
        <button class="chip" data-f="sote" id="cp-sote"></button>
        <button class="chip" data-f="base" id="cp-base"></button>
        <span class="res-label" id="resLabel"></span>
      </div>
    </div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="grid-wrap"><div class="grid" id="grid"></div></div>
</div>
<footer><p id="footerTxt"></p></footer>

<script>
// ── i18n ─────────────────────────────────────────────────────────────────────


var IB = 'https://eldenring.wiki.fextralife.com/file/Elden-Ring/';
function getImgUrl(slug, cat) {
  if (!slug) return null;
  // Try local path first (if user ran download_images.py)
  var local = 'images/' + (cat||'talismans') + '/' + slug + '.png';
  // Remote fallback URL
  var remote;
  if (slug.indexOf('_elden_ring_wiki_guide') >= 0) remote = IB + slug + '_200px.png';
  else if (slug.slice(-17) === '_elden_ring_wiki') remote = IB + slug + '_guide_200px.png';
  else remote = IB + slug + '_elden_ring_wiki_guide_200px.png';
  return { local: local, remote: remote };
}
function makeImgTag(slug, cat, w, h) {
  if (!slug) return '<span style="font-size:'+(h||32)+'px;line-height:1">'+getCatEmoji(cat)+'</span>';
  var urls = getImgUrl(slug, cat);
  var size = 'width:'+(w||32)+'px;height:'+(h||32)+'px;object-fit:contain';
  return '<img src="'+urls.local+'" style="'+size+'" alt="" '
       + 'onerror="this.src=\''+urls.remote+'\';this.onerror=function(){this.style.display=\'none\';this.nextElementSibling.style.display=\'inline\'}">'
       + '<span style="font-size:'+(Math.round((h||32)*0.6))+'px;display:none">'+getCatEmoji(cat)+'</span>';
}
var CAT_EMOJI = {talismans:'🔮',weapons:'⚔️',armor:'🛡️',sorceries:'✨',incantations:'🌟',spiritashes:'👻',shields:'🪖'};
function getCatEmoji(cat){ return CAT_EMOJI[cat]||'📦'; }
const TR={it:{nav_tracker:'Tracker',nav_map:'Mappa',nav_build:'Build Planner',nav_bestiary:'Bestiario',nav_wip:'In arrivo',nav_found:'trovati',search_ph:'Cerca item, effetto, localizzazione…',filter_all:'Tutti',filter_found:'✓ Trovati',filter_notfound:'✗ Non trovati',filter_sote:'Solo DLC',filter_base:'Solo Base',results:'risultati',cat_talismans:'Talismani',cat_weapons:'Armi',cat_armor:'Armature',cat_sorceries:'Incantesimi',cat_incantations:'Incantazioni',cat_spiritashes:'Spirit Ashes',cat_shields:'Scudi',footer:'Fan project non ufficiale · Elden Ring © FromSoftware / Bandai Namco · Dati: eldenring.wiki.gg'},en:{nav_tracker:'Tracker',nav_map:'Map',nav_build:'Build Planner',nav_bestiary:'Bestiary',nav_wip:'Coming soon',nav_found:'found',search_ph:'Search items, effects, locations…',filter_all:'All',filter_found:'✓ Found',filter_notfound:'✗ Not found',filter_sote:'DLC only',filter_base:'Base only',results:'results',cat_talismans:'Talismans',cat_weapons:'Weapons',cat_armor:'Armor',cat_sorceries:'Sorceries',cat_incantations:'Incantations',cat_spiritashes:'Spirit Ashes',cat_shields:'Shields',footer:'Unofficial fan project · Elden Ring © FromSoftware / Bandai Namco · Data: eldenring.wiki.gg'}};
function getLang(){return localStorage.getItem('er_lang')||'it';}
function setLang(l){localStorage.setItem('er_lang',l);location.reload();}
function t(k){return (TR[getLang()]||TR.it)[k]||k;}

// ── storage ───────────────────────────────────────────────────────────────────
function getFound(){return JSON.parse(localStorage.getItem('er_found')||'{}');}
function saveFound(o){localStorage.setItem('er_found',JSON.stringify(o));}
function itemKey(cat,name){return cat+'::'+name;}
function isFound(cat,name){return !!getFound()[itemKey(cat,name)];}
function toggleFound(cat,name){
  const f=getFound(),k=itemKey(cat,name);
  f[k]=!f[k]; if(!f[k])delete f[k]; saveFound(f); return f[k]||false;
}
function totalFound(){return Object.values(getFound()).filter(Boolean).length;}

// ── nav ───────────────────────────────────────────────────────────────────────
function renderNav(activeId){
  const lang=getLang(),tf=totalFound();
  const pages=[
    {id:'tracker',href:'index.html',icon:'📋',label:'nav_tracker'},
    {id:'map',href:'map.html',icon:'🗺️',label:'nav_map'},
    {id:'build',href:'build.html',icon:'⚙️',label:'nav_build',wip:true},
    {id:'bestiary',href:'bestiary.html',icon:'📖',label:'nav_bestiary',wip:true},
  ];
  const links=pages.map(p=>`<a href="${p.href}" class="nav-link${p.id===activeId?' active':''}">
    <span>${p.icon}</span><span>${t(p.label)}</span>
    ${p.wip?`<span class="nav-wip">${t('nav_wip')}</span>`:''}
  </a>`).join('');
  document.getElementById('nav-mount').innerHTML=`<nav class="topnav">
    <div class="topnav-inner">
      <a href="index.html" class="nav-logo">⚔ <span>ELDEN RING</span></a>
      <div class="nav-links">${links}</div>
      <div class="nav-right">
        <div class="nav-stat" id="navStat">${tf} ${t('nav_found')}</div>
        <div class="lang-toggle">
          <button class="lang-btn${lang==='it'?' active':''}" onclick="setLang('it')">IT</button>
          <button class="lang-btn${lang==='en'?' active':''}" onclick="setLang('en')">EN</button>
        </div>
      </div>
    </div>
  </nav>`;
}
function updateNavStat(){
  const el=document.getElementById('navStat');
  if(el)el.textContent=totalFound()+' '+t('nav_found');
}

// ── DATA ──────────────────────────────────────────────────────────────────────
const CATEGORIES=[
  {id:'talismans',key:'cat_talismans',icon:'🔮'},
  {id:'weapons',key:'cat_weapons',icon:'⚔️'},
  {id:'armor',key:'cat_armor',icon:'🛡️'},
  {id:'sorceries',key:'cat_sorceries',icon:'✨'},
  {id:'incantations',key:'cat_incantations',icon:'🌟'},
  {id:'spiritashes',key:'cat_spiritashes',icon:'👻'},
  {id:'shields',key:'cat_shields',icon:'🪖'},
];
</script>

<script>
// ── tracker logic ─────────────────────────────────────────────────────────────
const ST={tab:'talismans',filter:'all',search:''};

function catStats(id){
  const items=ITEMS[id]||[];
  return{found:items.filter(i=>isFound(id,i.name)).length,total:items.length};
}
function renderStatsBar(){
  const{found,total}=catStats(ST.tab);
  const pct=total?Math.round(found/total*100):0;
  document.getElementById('statsBar').innerHTML=`
    <span class="stat-found">${found}</span><span class="stat-sep"> / </span>
    <span class="stat-total">${total} ${t('nav_found')}</span>
    <div class="prog-track stat-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    <span class="stat-pct">${pct}%</span>`;
}
function renderTabs(){
  document.getElementById('catTabs').innerHTML=CATEGORIES.map(c=>{
    const{found,total}=catStats(c.id);
    return`<button class="cat-tab${c.id===ST.tab?' active':''}" data-cat="${c.id}">
      ${c.icon} <span>${t(c.key)}</span><span class="tab-cnt">${found}/${total}</span>
    </button>`;
  }).join('');
  document.querySelectorAll('.cat-tab').forEach(b=>b.addEventListener('click',()=>{
    ST.tab=b.dataset.cat;ST.search='';
    document.getElementById('searchInp').value='';
    renderAll();
  }));
}
function getFiltered(){
  let items=(ITEMS[ST.tab]||[]).slice();
  const q=ST.search.trim().toLowerCase();
  if(q)items=items.filter(i=>i.name.toLowerCase().includes(q)||i.effect.toLowerCase().includes(q)||i.loc.toLowerCase().includes(q));
  if(ST.filter==='found')    items=items.filter(i=>isFound(ST.tab,i.name));
  if(ST.filter==='notfound') items=items.filter(i=>!isFound(ST.tab,i.name));
  if(ST.filter==='sote')     items=items.filter(i=>i.dlc==='SotE');
  if(ST.filter==='base')     items=items.filter(i=>i.dlc==='Base');
  return items;
}
function renderGrid(){
  const items=getFiltered();
  const icon=CATEGORIES.find(c=>c.id===ST.tab)?.icon||'📦';
  document.getElementById('resLabel').textContent=items.length+' '+t('results');
  if(!items.length){document.getElementById('grid').innerHTML='<div class="empty"><p>—</p></div>';return;}
  document.getElementById('grid').innerHTML=items.map((item,i)=>{
    const found=isFound(ST.tab,item.name);
    const isLeg=item.effect.includes('Legg')||item.name.includes('Legg');
    const url=item.img?imgUrl(item.img):null;
    const imgTag=url?`<img src="${url}" alt="" loading="lazy" onerror="this.classList.add('err');this.nextElementSibling.style.opacity=1">`:'' ;
    return`<div class="card${found?' found':''}" data-cat="${ST.tab}" data-name="${item.name.replace(/"/g,'&quot;')}" style="animation-delay:${Math.min(i*.018,.28)}s">
      <div class="card-top">
        <div class="card-img">${makeImgTag(item.img,ST.tab,32,32)}</div>
        <div class="card-body">
          <div class="card-name">${item.name}</div>
          <div class="card-effect">${item.effect}</div>
        </div>
        <div class="card-check">${found?'✓':''}</div>
      </div>
      <div class="card-bottom">
        <div class="card-loc" title="${item.loc}">${item.loc}</div>
        ${isLeg?'<span class="badge badge-leg">Legg.</span>':''}
        <span class="badge ${item.dlc==='SotE'?'badge-sote':'badge-base'}">${item.dlc}</span>
      </div>
    </div>`;
  }).join('');
  document.querySelectorAll('.card').forEach(card=>{
    card.addEventListener('click',()=>{
      const name=card.dataset.name,cat=card.dataset.cat;
      const found=toggleFound(cat,name);
      card.classList.toggle('found',found);
      if(found){card.classList.add('shimmer');setTimeout(()=>card.classList.remove('shimmer'),700);}
      card.querySelector('.card-check').textContent=found?'✓':'';
      if(ST.filter==='found'||ST.filter==='notfound')renderGrid();
      renderTabs();renderStatsBar();updateNavStat();
    });
  });
}

function applyLabels(){
  [['all','filter_all'],['found','filter_found'],['nf','filter_notfound'],['sote','filter_sote'],['base','filter_base']].forEach(function(p){
    var el=document.getElementById('cp-'+p[0]);if(el)el.textContent=t(p[1]);
  });
  var si=document.getElementById('searchInp');if(si)si.placeholder=t('search_ph');
  var ft=document.getElementById('footerTxt');if(ft)ft.textContent=t('footer');
}
function renderAll(){applyLabels();renderTabs();renderStatsBar();renderGrid();updateNavStat();}

// chips
document.querySelectorAll('[data-f]').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('[data-f]').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');ST.filter=c.dataset.f;renderGrid();renderStatsBar();
  });
});
// search
let st2;
document.getElementById('searchInp').addEventListener('input',e=>{
  clearTimeout(st2);st2=setTimeout(()=>{ST.search=e.target.value;renderGrid();},160);
});
// init
renderNav('tracker');
renderAll();
</script>
