<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Build Planner — Elden Ring</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0c0b;--bg2:#141210;--surface:#1c1915;--surface2:#242018;
  --border:#2e2920;--border2:#3d3628;
  --gold:#c9a94e;--gold2:#e8c96a;--gold-dim:#7a6530;--gold-glow:rgba(201,169,78,.18);
  --text:#d4c9b0;--text2:#8a8070;--text3:#5a5448;
  --green:#2a6040;--green2:#3a8055;
  --nav-h:54px;--r:6px;
  --ff-d:'Cinzel',serif;--ff-b:'Crimson Pro',Georgia,serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--ff-b);font-size:16px;line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}
a{color:var(--gold);text-decoration:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.topnav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:linear-gradient(180deg,#0a0908f0,#0d0c0bcc);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:200}
.topnav-inner{max-width:1440px;margin:0 auto;padding:0 20px;height:100%;display:flex;align-items:center}
.nav-logo{display:flex;align-items:center;gap:8px;font-family:var(--ff-d);font-size:14px;font-weight:700;color:var(--gold);letter-spacing:.1em;margin-right:28px;white-space:nowrap;flex-shrink:0}
.nav-links{display:flex;align-items:stretch;height:var(--nav-h);flex:1;overflow-x:auto;scrollbar-width:none}
.nav-links::-webkit-scrollbar{display:none}
.nav-link{display:flex;align-items:center;gap:5px;padding:0 14px;font-family:var(--ff-d);font-size:10px;letter-spacing:.1em;color:var(--text3);border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap}
.nav-link:hover{color:var(--text2)}.nav-link.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-wip{font-size:8px;background:rgba(60,100,180,.3);color:#7aaaee;border:1px solid rgba(80,130,200,.3);border-radius:3px;padding:1px 4px}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.nav-stat{font-family:var(--ff-d);font-size:10px;color:var(--text2);background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;white-space:nowrap}
.lang-toggle{display:flex;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.lang-btn{background:none;border:none;padding:5px 9px;font-family:var(--ff-d);font-size:10px;color:var(--text3);cursor:pointer;transition:all .15s}
.lang-btn.active{background:rgba(201,169,78,.12);color:var(--gold)}
/* PAGE */
.page{padding-top:var(--nav-h)}
.page-header{padding:28px 24px 20px;background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--border)}
.page-header h1{font-family:var(--ff-d);font-size:clamp(18px,3vw,26px);color:var(--gold);letter-spacing:.06em}
.page-header p{font-size:13px;color:var(--text3);font-family:var(--ff-d);letter-spacing:.1em;margin-top:4px}
.page-body{max-width:1100px;margin:0 auto;padding:32px 24px 80px}
/* BUILD PLANNER LAYOUT */
.build-grid{display:grid;grid-template-columns:300px 1fr;gap:16px;margin-bottom:24px}
/* stat panel */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.panel-title{font-family:var(--ff-d);font-size:11px;letter-spacing:.12em;color:var(--gold);border-bottom:1px solid var(--border2);padding-bottom:8px;margin-bottom:14px}
/* level */
.level-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.level-num{font-family:var(--ff-d);font-size:36px;color:var(--gold);line-height:1;min-width:60px}
.level-info{font-size:13px;color:var(--text2)}
.level-info span{color:var(--text);display:block}
.class-select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:6px 10px;color:var(--text);font-family:var(--ff-d);font-size:11px;letter-spacing:.06em;outline:none;cursor:pointer;margin-bottom:14px}
.class-select option{background:var(--surface2)}
/* stats */
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.stat-label{font-family:var(--ff-d);font-size:10px;letter-spacing:.06em;color:var(--text2);width:80px;flex-shrink:0}
.stat-controls{display:flex;align-items:center;gap:4px}
.stat-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:3px;width:20px;height:20px;color:var(--text2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0}
.stat-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.stat-val{font-family:var(--ff-d);font-size:13px;color:var(--gold);width:26px;text-align:center}
.stat-bar-wrap{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:2px;transition:width .3s ease}
.stat-bonus{font-size:10px;color:var(--green2);min-width:28px;text-align:right;font-family:var(--ff-d)}
/* derived */
.derived-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.derived-box{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:8px 10px}
.derived-label{font-size:10px;color:var(--text3);font-family:var(--ff-d);letter-spacing:.06em;margin-bottom:2px}
.derived-val{font-family:var(--ff-d);font-size:16px;color:var(--gold)}
/* equip slots */
.equip-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.equip-slot{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:9px 11px;cursor:pointer;transition:border-color .15s;display:flex;align-items:center;gap:8px}
.equip-slot:hover{border-color:var(--gold-dim)}
.equip-slot.filled{border-color:var(--border2);background:var(--surface)}
.slot-icon{font-size:16px;flex-shrink:0;width:26px;text-align:center}
.slot-info{flex:1;min-width:0}
.slot-label{font-size:9px;color:var(--text3);font-family:var(--ff-d);letter-spacing:.06em}
.slot-name{font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* damage preview */
.dmg-preview{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:12px;margin-top:12px}
.dmg-title{font-family:var(--ff-d);font-size:10px;color:var(--gold);letter-spacing:.08em;margin-bottom:10px}
.dmg-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dmg-type{font-size:10px;font-family:var(--ff-d);color:var(--text3);width:60px;flex-shrink:0}
.dmg-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.dmg-fill{height:100%;border-radius:2px;transition:width .4s ease}
.dmg-val{font-family:var(--ff-d);font-size:11px;color:var(--text2);min-width:36px;text-align:right}
/* talisman slots */
.talisman-slots{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tal-slot{background:var(--surface2);border:1px dashed var(--border2);border-radius:var(--r);padding:9px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:border-color .15s;min-height:44px}
.tal-slot:hover{border-color:var(--gold-dim)}
.tal-slot.filled{border-style:solid;border-color:var(--border2);background:var(--surface)}
.tal-img{width:28px;height:28px;background:var(--surface);border:1px solid var(--border);border-radius:3px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.tal-img img{width:24px;height:24px;object-fit:contain}
.tal-info{flex:1;min-width:0}
.tal-name{font-size:10px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--ff-d);letter-spacing:.02em}
.tal-effect{font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tal-remove{font-size:10px;color:var(--text3);cursor:pointer;flex-shrink:0;padding:2px 4px}
.tal-remove:hover{color:var(--gold)}
/* saves */
.saves-row{display:flex;gap:8px;margin-bottom:16px}
.save-btn{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:8px;font-family:var(--ff-d);font-size:10px;letter-spacing:.08em;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s}
.save-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.save-btn.primary{background:linear-gradient(135deg,#2a2010,#1a1508);border-color:var(--gold-dim);color:var(--gold)}
.save-btn.primary:hover{border-color:var(--gold);box-shadow:0 0 12px var(--gold-glow)}
/* item picker modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:min(520px,94vw);max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
.modal-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-header h3{font-family:var(--ff-d);font-size:14px;color:var(--gold);letter-spacing:.06em;flex:1}
.modal-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:2px 6px;transition:color .15s}
.modal-close:hover{color:var(--text)}
.modal-search{padding:10px 18px;border-bottom:1px solid var(--border)}
.modal-search input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:7px 12px;color:var(--text);font-family:var(--ff-b);font-size:14px;outline:none}
.modal-search input:focus{border-color:var(--gold-dim)}
.modal-search input::placeholder{color:var(--text3)}
.modal-list{overflow-y:auto;flex:1}
.modal-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.modal-item:hover{background:var(--surface)}
.modal-item-img{width:32px;height:32px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.modal-item-img img{width:28px;height:28px;object-fit:contain}
.modal-item-info{flex:1;min-width:0}
.modal-item-name{font-family:var(--ff-d);font-size:11px;color:var(--text);letter-spacing:.03em}
.modal-item-effect{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
footer{text-align:center;padding:18px;border-top:1px solid var(--border)}
footer p{font-size:10px;color:var(--text3);font-family:var(--ff-d);letter-spacing:.06em}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:800px){.build-grid{grid-template-columns:1fr}.equip-grid,.talisman-slots{grid-template-columns:1fr}}
@media(max-width:900px){.nav-logo span:last-child{display:none}.nav-link span:not(:first-child){display:none}.nav-link{padding:0 10px}.nav-stat{display:none}}
@media(max-width:600px){.page-header,.page-body{padding-left:14px;padding-right:14px}}
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-inner">
    <a href="index.html" class="nav-logo">⚔ <span>ELDEN RING</span></a>
    <div class="nav-links">
      <a href="index.html"    class="nav-link"><span>📋</span><span id="lbl-tracker">Tracker</span></a>
      <a href="map.html"      class="nav-link"><span>🗺️</span><span id="lbl-map">Mappa</span></a>
      <a href="build.html"    class="nav-link active"><span>⚙️</span><span id="lbl-build">Build Planner</span></a>
      <a href="bestiary.html" class="nav-link"><span>📖</span><span id="lbl-bestiary">Bestiario</span><span class="nav-wip" id="lbl-wip">In arrivo</span></a>
    </div>
    <div class="nav-right">
      <div class="nav-stat" id="navStat"></div>
      <div class="lang-toggle">
        <button class="lang-btn" id="btnIT" onclick="setLang('it')">IT</button>
        <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h1 id="pg-title">⚙️ Build Planner</h1>
    <p id="pg-sub">Pianifica il tuo personaggio</p>
  </div>
  <div class="page-body">

    <div class="saves-row">
      <button class="save-btn primary" onclick="saveBuild()">💾 <span id="lbl-save">Salva build</span></button>
      <button class="save-btn" onclick="loadBuild()">📂 <span id="lbl-load">Carica</span></button>
      <button class="save-btn" onclick="resetBuild()">↺ <span id="lbl-reset">Reset</span></button>
      <button class="save-btn" onclick="shareBuild()">🔗 <span id="lbl-share">Condividi URL</span></button>
    </div>

    <div class="build-grid">

      <!-- LEFT: Stats -->
      <div>
        <div class="panel" style="margin-bottom:12px">
          <div class="panel-title" id="lbl-class">CLASSE</div>
          <select class="class-select" id="classSelect" onchange="onClassChange()">
            <option value="vagabond">Vagabond</option>
            <option value="warrior">Warrior</option>
            <option value="hero">Hero</option>
            <option value="bandit">Bandit</option>
            <option value="astrologer">Astrologer</option>
            <option value="prophet">Prophet</option>
            <option value="samurai">Samurai</option>
            <option value="prisoner">Prisoner</option>
            <option value="confessor">Confessor</option>
            <option value="wretch">Wretch</option>
          </select>
          <div class="level-row">
            <div class="level-num" id="levelNum">1</div>
            <div class="level-info">
              <span id="hpVal">HP 0</span>
              <span id="fpVal">FP 0</span>
              <span id="loadVal">Load 0/0</span>
            </div>
          </div>
          <div class="panel-title" id="lbl-stats">STATISTICHE</div>
          <div id="statsContainer"></div>
        </div>
        <div class="panel">
          <div class="panel-title" id="lbl-derived">VALORI DERIVATI</div>
          <div class="derived-grid" id="derivedGrid"></div>
        </div>
      </div>

      <!-- RIGHT: Equipment -->
      <div>
        <div class="panel" style="margin-bottom:12px">
          <div class="panel-title" id="lbl-equip">EQUIPAGGIAMENTO</div>
          <div class="equip-grid" id="equipGrid"></div>
          <div class="dmg-preview">
            <div class="dmg-title" id="lbl-dmg">DANNO STIMATO (Mano Destra 1)</div>
            <div id="dmgBars"></div>
            <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap" id="arTotal"></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title" id="lbl-talismans">TALISMANI (4 slot)</div>
          <div class="talisman-slots" id="talismanSlots"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<footer><p id="footerTxt"></p></footer>

<!-- ITEM PICKER MODAL -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle">Scegli item</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-search"><input id="modalSearch" placeholder="" oninput="filterModal()"></div>
    <div class="modal-list" id="modalList"></div>
  </div>
</div>

function getImgUrl(slug, cat) {
  if (!slug) return null;
  var local = 'images/' + (cat || 'talismans') + '/' + slug + '.png';
  // Try wiki.gg first (best quality, correct format)
  var wikiFile = SLUG_TO_WIKI[slug];
  var remote = wikiFile ? WIKI_BASE + wikiFile : null;
  // Fallback: fextralife (may be blocked by CORB but try anyway)
  var fext;
  if (slug.indexOf('_elden_ring_wiki_guide') >= 0) fext = IB_FEXT + slug + '_200px.png';
  else if (slug.slice(-17) === '_elden_ring_wiki') fext = IB_FEXT + slug + '_guide_200px.png';
  else fext = IB_FEXT + slug + '_elden_ring_wiki_guide_200px.png';
  return { local: local, remote: remote || fext, fext: fext };
}
function makeImgTag(slug, cat, w, h) {
  if (!slug) return '<span style="font-size:' + (h||32) + 'px;line-height:1">' + getCatEmoji(cat) + '</span>';
  var u = getImgUrl(slug, cat);
  var size = 'width:' + (w||32) + 'px;height:' + (h||32) + 'px;object-fit:contain;display:block';
  // Try local → wiki.gg → fextralife → emoji fallback
  var fb1 = u.remote ? 'this.src=\'' + u.remote + '\';this.onerror=fb2' : 'fb2.call(this)';
  var fb2 = 'this.src=\'' + u.fext + '\';this.onerror=function(){this.style.display=\'none\';this.nextElementSibling.style.display=\'inline\'}';
  return '<img src="' + u.local + '" style="' + size + '" alt="" '
       + 'onerror="var fb2=function(){' + fb2 + '};' + fb1 + '">'
       + '<span style="font-size:' + Math.round((h||32)*0.6) + 'px;display:none">' + getCatEmoji(cat) + '</span>';
}

function calcHP(vig,level){
  if(vig<=25) return Math.floor(300+500*(vig/25));
  if(vig<=40) return Math.floor(800+650*((vig-25)/15));
  if(vig<=60) return Math.floor(1450+450*((vig-40)/20));
  return Math.floor(1900+200*((vig-60)/39));
}
function calcFP(min){return Math.floor(50+45*Math.min(min,60)/60*3);}
function calcStamina(end){return Math.floor(80+25*Math.min(end,60)/60*3);}
function calcLoad(end){return Math.floor(45+30*Math.min(end,99)/99*2);}

// ── CALC level from stats ─────────────────────────────────────────────────────
function calcLevel(){
  const cls=CLASSES[BUILD.classId];
  const base=Object.values(cls).slice(1).reduce((a,b)=>a+b,0);
  const cur=Object.values(BUILD.stats).reduce((a,b)=>a+b,0);
  return cls.level+(cur-base);
}

// ── TALISMAN BONUSES ─────────────────────────────────────────────────────────
function getTalismanBonuses(){
  const b={str:0,dex:0,int:0,fai:0,arc:0,vig:0,end:0,min:0};
  BUILD.talismans.forEach(tal=>{
    if(!tal)return;
    if(tal.name==="Marika's Soreseal"||tal.name==="Marika's Scarseal"){b.min+=tal.name.includes('Sore')?5:3;b.int+=tal.name.includes('Sore')?5:3;b.fai+=tal.name.includes('Sore')?5:3;b.arc+=tal.name.includes('Sore')?5:3;}
    if(tal.name==="Radagon's Soreseal"||tal.name==="Radagon's Scarseal"){b.vig+=tal.name.includes('Sore')?5:3;b.end+=tal.name.includes('Sore')?5:3;b.str+=tal.name.includes('Sore')?5:3;b.dex+=tal.name.includes('Sore')?5:3;}
    if(tal.name==="Millicent's Prosthesis") b.dex+=5;
  });
  return b;
}

function renderStats(){
  const bonus=getTalismanBonuses();
  const cont=document.getElementById('statsContainer');
  cont.innerHTML=STAT_KEYS.map(k=>{
    const v=BUILD.stats[k], bon=bonus[k]||0, tot=v+bon;
    const pct=Math.min((v/99)*100,100);
    const label=t('stat_'+k)||k;
    return`<div class="stat-row">
      <span class="stat-label">${label}</span>
      <div class="stat-controls">
        <button class="stat-btn" onclick="adjStat('${k}',-1)">−</button>
        <span class="stat-val">${v}</span>
        <button class="stat-btn" onclick="adjStat('${k}',1)">+</button>
      </div>
      <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${pct}%;background:${STAT_COLORS[k]}"></div></div>
      ${bon>0?`<span class="stat-bonus">+${bon}</span>`:'<span class="stat-bonus"></span>'}
    </div>`;
  }).join('');
}

}

function renderDerived(){
  const b=getTalismanBonuses();
  const vig=BUILD.stats.vig+(b.vig||0);
  const end=BUILD.stats.end+(b.end||0);
  const min=BUILD.stats.min+(b.min||0);
  const hp=calcHP(vig,calcLevel());
  const fp=calcFP(min);
  const stam=calcStamina(end);
  const load=calcLoad(end);
  const lvl=calcLevel();
  document.getElementById('levelNum').textContent=lvl;
  document.getElementById('hpVal').textContent='HP '+hp;
  document.getElementById('fpVal').textContent='FP '+fp;
  document.getElementById('loadVal').textContent='Load '+load;
  document.getElementById('derivedGrid').innerHTML=`
    <div class="derived-box"><div class="derived-label">HP</div><div class="derived-val" style="color:#c84040">${hp}</div></div>
    <div class="derived-box"><div class="derived-label">FP</div><div class="derived-val" style="color:#4080c8">${fp}</div></div>
    <div class="derived-box"><div class="derived-label">Stamina</div><div class="derived-val" style="color:#50a050">${stam}</div></div>
    <div class="derived-box"><div class="derived-label">Max Load</div><div class="derived-val" style="color:#c87828">${load}</div></div>
    <div class="derived-box"><div class="derived-label">Livello</div><div class="derived-val" style="color:var(--gold)">${lvl}</div></div>
    <div class="derived-box"><div class="derived-label">Poise</div><div class="derived-val" style="color:var(--text2)">~</div></div>`;
}

// ── RENDER EQUIP SLOTS ────────────────────────────────────────────────────────

function slotCat(s){
  if(s==='rh1'||s==='rh2')return 'weapons';
  if(s==='lh1'||s==='lh2')return 'shields';
  if(s==='head'||s==='chest'||s==='arms'||s==='legs')return 'armor';
  return 'talismans';
}
function renderEquip(){
  const slots=['rh1','rh2','lh1','lh2','head','chest','arms','legs'];
  document.getElementById('equipGrid').innerHTML=slots.map(s=>{
    const meta=SLOT_META[s];
    const item=BUILD.equip[s];
    const imgUrl=item&&item.img?getCatEmoji('weapons'):null;
    const imgHtml=imgUrl?`<img src="${imgUrl}" style="width:24px;height:24px;object-fit:contain" onerror="this.style.display='none'">`:`<span>${meta.icon}</span>`;
    return`<div class="equip-slot${item?' filled':''}" onclick="openPicker('${s}')">
      <div class="slot-icon">${imgHtml}</div>
      <div class="slot-info">
        <div class="slot-label">${t(meta.labelKey)}</div>
        <div class="slot-name">${item?item.name:'—'}</div>
      </div>
    </div>`;
  }).join('');
  renderDamage();
}

// ── RENDER DAMAGE ─────────────────────────────────────────────────────────────
function renderDamage(){
  const w=BUILD.equip.rh1;
  if(!w||!w.phys){
    document.getElementById('dmgBars').innerHTML='<div style="font-size:12px;color:var(--text3);font-family:var(--ff-d)">— Nessuna arma equipaggiata —</div>';
    document.getElementById('arTotal').innerHTML='';
    return;
  }
  const types=[{k:'phys',c:'#d4a060',l:'Fisico'},{k:'mag',c:'#7080e0',l:'Magico'},{k:'fire',c:'#e06030',l:'Fuoco'},{k:'light',c:'#e0c030',l:'Fulmine'},{k:'holy',c:'#d0c080',l:'Sacro'}];
  const maxDmg=Math.max(...types.map(tp=>w[tp.k]||0),1);
  const ar=types.reduce((s,tp)=>s+(w[tp.k]||0),0);
  document.getElementById('dmgBars').innerHTML=types.filter(tp=>(w[tp.k]||0)>0).map(tp=>`
    <div class="dmg-bar-row">
      <span class="dmg-type">${tp.l}</span>
      <div class="dmg-track"><div class="dmg-fill" style="width:${((w[tp.k]||0)/maxDmg)*100}%;background:${tp.c}"></div></div>
      <span class="dmg-val">${w[tp.k]||0}</span>
    </div>`).join('');
  document.getElementById('arTotal').innerHTML=`<span style="font-family:var(--ff-d);font-size:11px;color:var(--gold);background:rgba(201,169,78,.1);border:1px solid rgba(201,169,78,.2);border-radius:3px;padding:3px 8px">AR Totale: ~${ar}</span>`;
}

// ── RENDER TALISMANS ──────────────────────────────────────────────────────────
function renderTalismans(){
  document.getElementById('talismanSlots').innerHTML=BUILD.talismans.map((tal,i)=>{
    if(!tal) return`<div class="tal-slot" onclick="openTalismanPicker(${i})">
      <div class="tal-img">🔮</div>
      <div class="tal-info"><div class="tal-name" style="color:var(--text3)">— Vuoto —</div></div>
    </div>`;
    const imgUrl=tal.img?getCatEmoji('weapons'):null;
    const imgHtml=imgUrl?`<img src="${imgUrl}" onerror="this.outerHTML='🔮'">`:'🔮';
    return`<div class="tal-slot filled" onclick="openTalismanPicker(${i})">
      <div class="tal-img">${imgHtml}</div>
      <div class="tal-info">
        <div class="tal-name">${tal.name}</div>
        <div class="tal-effect">${tal.effect}</div>
      </div>
      <span class="tal-remove" onclick="event.stopPropagation();removeTalisman(${i})">✕</span>
    </div>`;
  }).join('');
}
function removeTalisman(i){BUILD.talismans[i]=null;renderAll();}

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function renderAll(){renderStats();renderDerived();renderEquip();renderTalismans();}

// ── CLASS CHANGE ──────────────────────────────────────────────────────────────
function onClassChange(){
  BUILD.classId=document.getElementById('classSelect').value;
  const cls=CLASSES[BUILD.classId];
  STAT_KEYS.forEach(k=>BUILD.stats[k]=cls[k]);
  renderAll();
}

// ── ITEM PICKER MODAL ─────────────────────────────────────────────────────────
let pickerCtx=null;
function openPicker(slotId){
  const meta=SLOT_META[slotId];
  pickerCtx={type:'equip',slotId};
  let list=[];
  if(meta.list==='weapons') list=WEAPONS_LIST;
  else if(meta.list==='shields') list=SHIELDS_LIST;
  else if(meta.list==='head') list=ARMOR_HEAD;
  else if(meta.list==='chest') list=ARMOR_CHEST;
  else if(meta.list==='arms') list=ARMOR_ARMS;
  else if(meta.list==='legs') list=ARMOR_LEGS;
  document.getElementById('modalTitle').textContent=t(meta.labelKey);
  document.getElementById('modalSearch').value='';
  renderModalList(list,'');
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.getElementById('modalSearch').focus();
}
function openTalismanPicker(idx){
  pickerCtx={type:'talisman',idx};
  document.getElementById('modalTitle').textContent='Talismano slot '+(idx+1);
  document.getElementById('modalSearch').value='';
  renderModalList(TALISMANS_LIST,'');
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.getElementById('modalSearch').focus();
}
function renderModalList(list,q){
  const filtered=q?list.filter(i=>i.name.toLowerCase().includes(q.toLowerCase())):list;
  document.getElementById('modalList').innerHTML=filtered.map((item,i)=>{
    const url=item.img?getCatEmoji('weapons'):null;
    const imgHtml=url?`<img src="${url}" style="width:28px;height:28px;object-fit:contain" onerror="this.style.display='none'">`:
      (item.type?'⚔️':item.effect?'🔮':'🛡️');
    return`<div class="modal-item" onclick="selectItem(${i})">
      <div class="modal-item-img">${imgHtml}</div>
      <div class="modal-item-info">
        <div class="modal-item-name">${item.name}</div>
        <div class="modal-item-effect">${item.type||item.effect||''}</div>
      </div>
    </div>`;
  }).join('');
  // store filtered for click index
  document.getElementById('modalList')._filtered=filtered;
}
function filterModal(){
  const q=document.getElementById('modalSearch').value;
  const meta=pickerCtx?.type==='talisman'?null:SLOT_META[pickerCtx?.slotId];
  let list=TALISMANS_LIST;
  if(pickerCtx?.type==='equip'){
    const m=meta.list;
    if(m==='weapons') list=WEAPONS_LIST;
    else if(m==='shields') list=SHIELDS_LIST;
    else if(m==='head') list=ARMOR_HEAD;
    else if(m==='chest') list=ARMOR_CHEST;
    else if(m==='arms') list=ARMOR_ARMS;
    else if(m==='legs') list=ARMOR_LEGS;
  }
  renderModalList(list,q);
}
function selectItem(i){
  const filtered=document.getElementById('modalList')._filtered||[];
  const item=filtered[i];
  if(!item)return;
  if(pickerCtx?.type==='equip') BUILD.equip[pickerCtx.slotId]=item;
  else if(pickerCtx?.type==='talisman') BUILD.talismans[pickerCtx.idx]=item;
  closeModal();renderAll();
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modalOverlay'))return;
  document.getElementById('modalOverlay').classList.add('hidden');
}

// ── SAVE / LOAD / SHARE ───────────────────────────────────────────────────────
function saveBuild(){
  localStorage.setItem('er_build',JSON.stringify(BUILD));
  const btn=document.querySelector('.save-btn.primary');
  const orig=btn.textContent;
  btn.textContent='✓ '+t('saved');
  setTimeout(()=>btn.innerHTML=`💾 <span>${t('lbl_save')}</span>`,1500);
}
function loadBuild(){
  try{const s=localStorage.getItem('er_build');if(s){BUILD=JSON.parse(s);document.getElementById('classSelect').value=BUILD.classId;renderAll();}}catch(e){}
}
function resetBuild(){
  if(!confirm(t('reset_q')))return;
  const cls=CLASSES['vagabond'];
  BUILD={classId:'vagabond',stats:{vig:cls.vig,min:cls.min,end:cls.end,str:cls.str,dex:cls.dex,int:cls.int,fai:cls.fai,arc:cls.arc},equip:{rh1:null,rh2:null,lh1:null,lh2:null,head:null,chest:null,arms:null,legs:null},talismans:[null,null,null,null]};
  document.getElementById('classSelect').value='vagabond';
  renderAll();
}
function shareBuild(){
  const enc=btoa(JSON.stringify(BUILD));
  const url=location.origin+location.pathname+'?build='+enc;
  navigator.clipboard.writeText(url).then(()=>{
    const btn=document.querySelectorAll('.save-btn')[3];
    btn.textContent='✓ '+t('shared');
    setTimeout(()=>btn.innerHTML=`🔗 <span>${t('lbl_share')}</span>`,2000);
  });
}
// Load from URL param
(function(){
  const p=new URLSearchParams(location.search).get('build');
  if(p){try{BUILD=JSON.parse(atob(p));document.getElementById('classSelect').value=BUILD.classId;}catch(e){}}
})();

// ── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('classSelect').value=BUILD.classId;
renderAll();
</script>
